name: terraform-ci

# WHEN the robot wakes up.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default for the whole workflow.
permissions:
  contents: read

jobs:
  # JOB 1 — the security gate. No AWS needed: Checkov only reads files.
  checkov:
    name: Checkov security scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov on terraform/
        run: checkov -d terraform/ --compact

  # JOB 2 — terraform plan. Needs AWS (via OIDC). Runs only after Checkov passes.
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs: checkov
    if: github.event_name == 'push'
    permissions:
      id-token: write   # REQUIRED for OIDC — lets this job request the token
      contents: read
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Get short-lived AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform plan
        run: terraform plan -no-color -lock-timeout=120s
        working-directory: terraform